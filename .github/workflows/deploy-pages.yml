name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # npm ci is intentionally not used here: this lockfile's optional native
      # deps (@emnapi/* pulled in via Vite's wasm fallback chain) resolve
      # differently across npm versions, making strict lock matching flaky.
      # Dropping Nuxt did not remove that risk — Vite is still a direct dep.
      # `npm ci` does succeed on the post-migration lockfile locally, so it is
      # worth retrying here; revert to `npm install` if CI goes red again.
      - run: npm install

      # The /portfolio/ base path is baked into vite.config.ts.
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
